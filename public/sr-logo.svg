<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="metal-s" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="18%"  stop-color="#6a6a6a"/>
      <stop offset="35%"  stop-color="#1a1a1a"/>
      <stop offset="55%"  stop-color="#0d0d0d"/>
      <stop offset="75%"  stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="metal-r" x1="10%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="20%"  stop-color="#5a5a5a"/>
      <stop offset="40%"  stop-color="#141414"/>
      <stop offset="60%"  stop-color="#0a0a0a"/>
      <stop offset="80%"  stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="drop-s">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000060"/>
    </filter>
    <filter id="drop-r">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000060"/>
    </filter>
  </defs>
  <!-- S — slightly left and lower -->
  <text
    x="8"
    y="155"
    font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
    font-size="145"
    font-weight="700"
    fill="url(#metal-s)"
    filter="url(#drop-s)"
  >S</text>
  <!-- R — slightly right and higher, layered in front -->
  <text
    x="88"
    y="148"
    font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
    font-size="148"
    font-weight="700"
    fill="url(#metal-r)"
    filter="url(#drop-r)"
  >R</text>
</svg>
